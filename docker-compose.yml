# ============================================================
# Docker Compose — 一键启动前后端 + 网络
# 运行：docker-compose up -d
# ============================================================
version: '3.8'

services:
  server:
    build: ./travel-server
    container_name: travel-server
    ports:
      - "3300:3300"
    env_file:
      - ./travel-server/.env
    restart: unless-stopped
    volumes:
      - ./travel-server/data:/app/data

  client:
    build: ./agentTravel
    container_name: travel-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
